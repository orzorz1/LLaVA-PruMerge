<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="1100" height="800">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #222; }
      .sub { font-size: 12px; fill: #555; }
      .label { font-size: 12px; fill: #333; }
      .note { font-size: 11px; fill: #444; }
      .mono { font-family: Menlo,Consolas,monospace; font-size: 11px; fill: #0d47a1; }
      .box { fill: #f7faff; stroke: #90caf9; stroke-width: 1.2; }
      .box2 { fill: #fff7f0; stroke: #ffcc80; stroke-width: 1.2; }
      .heat { fill: rgba(46, 125, 50, 0.20); stroke: rgba(46,125,50,0.55); stroke-width: 1.4; }
      .img { fill: rgba(46, 125, 50, 0.12); stroke: rgba(46,125,50,0.42); stroke-width: 2; }
      .prefix { fill: rgba(125, 81, 179, 0.10); stroke: rgba(125,81,179,0.35); stroke-width: 1; }
      .q { fill: rgba(30, 136, 229, 0.10); stroke: rgba(30,136,229,0.35); stroke-width: 1.2; }
      .hide { fill: rgba(0,0,0,0.06); stroke: rgba(0,0,0,0.25); stroke-width: 1; stroke-dasharray: 4 4; }
      .ate { fill: rgba(255, 152, 0, 0.12); stroke: rgba(255, 152, 0, 0.55); stroke-width: 2; }
      .mask { fill: rgba(231, 76, 60, 0.12); }
      .viewerBar { fill: rgba(244, 67, 54, 0.18); stroke: rgba(244,67,54,0.7); stroke-width: 1; }
    ]]></style>
  </defs>

  <text x="550" y="35" text-anchor="middle" class="title">FastV+diff 因果偏差规避示意</text>
  <text x="550" y="58" text-anchor="middle" class="sub">r: 只取图像后query行；c: 列和除以viewers；然后做ATE差分</text>

  <text x="140" y="95" class="label">注意力矩阵 A（行=Query，列=Key；因果mask: j&gt;i => 0）</text>

  <!-- matrix schematic -->
  <g transform="translate(70,115)">
    <rect x="10" y="10" width="350" height="350" fill="none" stroke="#90a4ae" stroke-width="1.2"/>
    <polygon class="mask" points="10,10 360,10 360,360"/>
    <line x1="10" y1="10" x2="360" y2="360" stroke="rgba(231,76,60,0.75)" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="200" y="25" class="note" fill="#b71c1c">mask: j&gt;i => 0</text>

    <!-- segments: sys=2, img=5, q=3 -->
    <rect class="prefix" x="10" y="10" width="70" height="350"/>
    <rect class="img" x="80" y="10" width="175" height="350"/>
    <rect class="q" x="255" y="10" width="105" height="350"/>

    <rect class="prefix" x="10" y="10" width="350" height="70"/>
    <rect class="img" x="10" y="80" width="350" height="175"/>
    <rect class="q" x="10" y="255" width="350" height="105"/>

    <!-- r_new: query rows in q segment, key cols in img segment -->
    <rect class="heat" x="80" y="255" width="175" height="105"/>
    <text x="270" y="285" class="note">r_new 区域</text>

    <!-- r_old excluded: query rows sys+img with img keys -->
    <rect class="hide" x="80" y="10" width="175" height="245"/>
    <text x="270" y="160" class="note">r_old 不使用</text>

    <!-- c region: img-img block -->
    <rect class="ate" x="80" y="80" width="175" height="175"/>
    <text x="270" y="145" class="note">c 子矩阵</text>

    <!-- viewers bars -->
    <text x="167.5" y="405" text-anchor="middle" class="label">viewers(可见行数)</text>
    <g transform="translate(80,420)">
      <rect class="viewerBar" x="0" y="0" width="35" height="70"/>
      <rect class="viewerBar" x="35" y="20" width="35" height="50"/>
      <rect class="viewerBar" x="70" y="35" width="35" height="35"/>
      <rect class="viewerBar" x="105" y="52" width="35" height="18"/>
      <rect class="viewerBar" x="140" y="62" width="35" height="8"/>
      <text x="17.5" y="88" text-anchor="middle" class="mono" fill="#c62828">5</text>
      <text x="52.5" y="88" text-anchor="middle" class="mono" fill="#c62828">4</text>
      <text x="87.5" y="88" text-anchor="middle" class="mono" fill="#c62828">3</text>
      <text x="122.5" y="88" text-anchor="middle" class="mono" fill="#c62828">2</text>
      <text x="157.5" y="88" text-anchor="middle" class="mono" fill="#c62828">1</text>
    </g>

    <text x="45" y="75" text-anchor="middle" class="label" fill="#4a148c">prefix</text>
    <text x="167.5" y="75" text-anchor="middle" class="label" fill="#1b5e20">img</text>
    <text x="307.5" y="75" text-anchor="middle" class="label" fill="#0d47a1">question</text>
    <text x="200" y="475" class="note" fill="#455a64">示意：sys=2, img=5, q=3</text>
  </g>

  <!-- flow chart -->
  <g transform="translate(530,130)">
    <rect x="0" y="0" width="520" height="590" class="box" rx="14"/>
    <text x="260" y="40" text-anchor="middle" class="label" fill="#0d47a1">计算流程（fastv_diff.py）</text>

    <rect x="30" y="70" width="460" height="55" fill="#ffffff" stroke="#64b5f6" stroke-width="1.6" rx="10"/>
    <text x="260" y="98" text-anchor="middle" class="note">A = mean_heads(attn)</text>

    <text x="125" y="170" text-anchor="middle" class="label" fill="#1b5e20">c_i</text>
    <rect x="30" y="185" width="215" height="155" class="box" rx="10"/>
    <text x="137.5" y="212" text-anchor="middle" class="note">m = A[img,img]</text>
    <text x="137.5" y="235" text-anchor="middle" class="mono">col_sums = sum_i m[i,j]</text>
    <text x="137.5" y="258" text-anchor="middle" class="note">校正：/viewers</text>
    <text x="137.5" y="282" text-anchor="middle" class="mono">col_means = col_sums / viewers</text>
    <text x="137.5" y="310" text-anchor="middle" class="note">ATE差分</text>
    <text x="137.5" y="333" text-anchor="middle" class="mono">c = ATE(col_means)</text>

    <text x="400" y="170" text-anchor="middle" class="label" fill="#0d47a1">r_i</text>
    <rect x="275" y="185" width="215" height="155" class="box2" rx="10"/>
    <text x="382.5" y="212" text-anchor="middle" class="note">只取 q_to_img</text>
    <text x="382.5" y="235" text-anchor="middle" class="mono">q_to_img = A[q_rows,img]</text>
    <text x="382.5" y="258" text-anchor="middle" class="note">聚合(可选)</text>
    <text x="382.5" y="282" text-anchor="middle" class="mono">sum / last-K / decay / softmax</text>
    <text x="382.5" y="310" text-anchor="middle" class="note">ATE差分</text>
    <text x="382.5" y="333" text-anchor="middle" class="mono">r = ATE(q_col_sums)</text>

    <rect x="30" y="365" width="460" height="85" fill="#ffffff" stroke="#ffb74d" stroke-width="1.6" rx="10"/>
    <text x="260" y="392" text-anchor="middle" class="note">s = c + lambda_tt * r</text>
    <text x="260" y="415" text-anchor="middle" class="note">keep = topk(s)</text>

    <text x="260" y="475" text-anchor="middle" class="label" fill="#455a64">因果偏差规避</text>
    <text x="55" y="505" class="note">• r: 丢弃 prefix + img 内行（避免零值/位置梯度影响）</text>
    <text x="55" y="530" class="note">• c: 对每列用 viewers 归一化（抵消“靠前列可见行更多”的偏差）</text>
  </g>
</svg>
